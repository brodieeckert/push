<script>
        // Your custom JSONBin configuration
        const BIN_ID = '6a3d9cb9f5f4af5e29313214';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        
        // ⚠️ PASTE YOUR JSONBIN MASTER API KEY HERE BETWEEN THE QUOTES:
        const MASTER_KEY = 'YOUR_MASTER_KEY_HERE'; 

        let currentData = { brodie: 0, ned: 0 };
        let isUpdating = false;

        const brodieEl = document.getElementById('brodie-count');
        const nedEl = document.getElementById('ned-count');
        const statusEl = document.getElementById('status');

        // Helper function to get current cycle date string in Adelaide time zone
        function getAdelaideDateKey() {
            const options = { timeZone: 'Australia/Adelaide', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', hour12: false };
            const formatter = new Intl.DateTimeFormat('en-AU', options);
            const parts = formatter.formatToParts(new Date());
            
            const map = Object.fromEntries(parts.map(p => [p.type, p.value]));
            const year = map.year;
            const month = map.month;
            let day = parseInt(map.day, 10);
            const hour = parseInt(map.hour, 10);

            // Resets exactly at 12:00 PM (noon). Hours 0-11 belong to yesterday's cycle
            if (hour < 12) {
                day -= 1; 
            }
            return `${year}-${month}-${day}`;
        }

        // Fetch live counts from JSONBin
        async function fetchCounts() {
            if (isUpdating) return; 
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': MASTER_KEY,
                        'X-Bin-Meta': 'false' // Tells JSONBin to return just our data, no extra metadata
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const currentCycle = getAdelaideDateKey();
                    
                    if (data.cycleKey === currentCycle) {
                        currentData.brodie = data.brodie || 0;
                        currentData.ned = data.ned || 0;
                    } else {
                        // Time has crossed 12pm Adelaide time since last update. Reset!
                        currentData.brodie = 0;
                        currentData.ned = 0;
                        await saveCounts(0, 0); 
                    }
                    
                    updateUI();
                    statusEl.innerText = "Live Synced via Private Cloud";
                    statusEl.className = "text-center text-xs text-emerald-400 border-t border-slate-700 pt-4";
                }
            } catch (err) {
                statusEl.innerText = "Syncing paused (checking connection...)";
                statusEl.className = "text-center text-xs text-amber-500 border-t border-slate-700 pt-4";
            }
        }

        // Save counts to JSONBin using PUT (replaces the whole file)
        async function saveCounts(brodieVal, nedVal) {
            isUpdating = true;
            const payload = {
                cycleKey: getAdelaideDateKey(),
                brodie: brodieVal,
                ned: nedVal
            };

            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(payload)
                });
                currentData.brodie = brodieVal;
                currentData.ned = nedVal;
                updateUI();
            } catch (err) {
                console.error("Failed to save data:", err);
            } finally {
                isUpdating = false;
            }
        }

        function updateUI() {
            brodieEl.innerText = currentData.brodie;
            nedEl.innerText = currentData.ned;
        }

        // Handle button clicks
        async function increment(user) {
            if (user === 'brodie') {
                currentData.brodie += 1;
            } else {
                currentData.ned += 1;
            }
            updateUI(); // Optimistic update on screen instantly

            await saveCounts(currentData.brodie, currentData.ned);
        }

        // Auto-refresh data from cloud every 3 seconds
        setInterval(fetchCounts, 3000);
        
        // Initial load
        fetchCounts();
    </script>
